<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Data | Ryan Johnson</title>
    <link rel="stylesheet" href="bio-table.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation Back Link -->
    <div style="margin-bottom: 1.5rem;">
        <a href="bio.html"
            style="text-decoration: none; color: var(--secondary-color); font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.35rem; transition: color 0.2s;"
            onmouseover="this.style.color='var(--primary-color)'"
            onmouseout="this.style.color='var(--secondary-color)'">
            <span style="font-size: 1.25rem; line-height: 1;">&lsaquo;</span> Back to Bio
        </a>
    </div>

    <div class="header" style="margin-bottom: 2rem;">
        <h1 style="margin: 0; font-size: 2rem;">Bio Data</h1>
        <p style="color: var(--secondary-color); margin-top: 0.5rem;">Interactive overview of career events, speaking
            engagements, publications, and appointments.</p>
    </div>

    <div class="controls">
        <input type="text" id="tableSearch" placeholder="Search bio data by title, organization, topic...">
        <select id="sectionFilter">
            <option value="">All Sections</option>
            <!-- Sections populated dynamically -->
        </select>
        <span id="projectCount" style="font-size: 0.875rem; color: var(--secondary-color);"></span>
    </div>

    <div class="table-container">
        <table id="bioTable">
            <thead>
                <tr>
                    <th style="width: 5%; text-align: center;">Media</th>
                    <th data-key="year" style="width: 5%;">Year</th>
                    <th data-key="section" style="width: 5%;">Section</th>
                    <th data-key="organization" style="width: 5%;">Organization / Publisher</th>
                    <th data-key="title" style="width: 20%;">Title / Appointment</th>
                    <th style="width: 40%;">Blurb</th>
                    <th data-key="topic" style="width: 5%;">Topic</th>
                    <th data-key="category" style="width: 5%;">Category / Scope</th>
                    <th data-key="location" style="width: 10%;">Location</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows injected here by JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- Modal for Details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-top: 0;">Details</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="bio-table.js"></script>
</body>

</html>
